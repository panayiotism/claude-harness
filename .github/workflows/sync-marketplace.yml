name: Sync to Marketplace

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/**'
      - 'skills/**'
      - 'agents/**'
      - 'hooks/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'setup.sh'
      - 'CLAUDE.md'
      - 'README.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Validate plugin
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate .

      - name: Checkout marketplace repo
        uses: actions/checkout@v4
        with:
          repository: panayiotism/claude-harness-marketplace
          path: marketplace
          token: ${{ secrets.MARKETPLACE_PAT }}

      - name: Sync plugin files
        run: |
          rm -rf marketplace/plugins/claude-harness
          mkdir -p marketplace/plugins/claude-harness
          rsync -av \
            --exclude='.git' \
            --exclude='tests/' \
            --exclude='RELEASES/' \
            --exclude='.claude-harness/' \
            --exclude='.claude/' \
            --exclude='.github/' \
            --exclude='marketplace/' \
            --exclude='__pycache__/' \
            ./ marketplace/plugins/claude-harness/

      - name: Commit and push
        run: |
          SOURCE_SHA=$(git rev-parse --short HEAD)
          cd marketplace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || \
            git commit -m "sync: claude-harness ${SOURCE_SHA}"
          git push
